name: CI

on:
  push:
    branches:
      - '*develop*'
      - '*master*'
  pull_request:
    branches:
      - '*develop*'
      - '*master*'

jobs:
  cross_build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
      - name: Build and Test (Windows)
        if: runner.os == 'Windows'
        run: ./ci.bat
        shell: cmd
      - name: Build and Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x ci.sh
          ./ci.sh
        shell: bash
      - name: Deploy
        run: echo "Deploy step (customize as needed)"
